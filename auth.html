<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Aveline Luxury Fashion</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .auth-section {
            background-color: var(--tertiary);
        }

        .auth-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            border-color: var(--border-color) !important;
        }

        .form-control {
            background-color: var(--input-bg);
            border-color: var(--input-border);
            color: var(--text-color);
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background-color: var(--input-bg);
            color: var(--text-color);
            border-color: var(--primary);
            box-shadow: none;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-color);
            opacity: 0.6;
            margin: 1.5rem 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .auth-divider:not(:empty)::before {
            margin-right: .5em;
        }

        .auth-divider:not(:empty)::after {
            margin-left: .5em;
        }

        .social-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background-color: var(--tertiary);
            color: var(--text-color);
            border-color: var(--primary);
        }

        .auth-theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        /* Nav Pills for Auth */
        .auth-pills .nav-link {
            color: var(--text-color);
            background-color: transparent;
            border-radius: 0;
            border-bottom: 2px solid transparent;
            padding-bottom: 0.5rem;
            font-weight: 500;
        }

        .auth-pills .nav-link.active {
            color: var(--primary);
            background-color: transparent;
            border-bottom-color: var(--primary);
        }

        .auth-pills .nav-item {
            flex: 1;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- Theme Toggle -->
    <button class="btn theme-toggle-btn auth-theme-toggle" aria-label="Toggle Theme">
        <i class="bi bi-moon-fill dark-icon"></i>
        <i class="bi bi-sun-fill light-icon" style="display:none;"></i>
    </button>

    <section class="auth-section d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">

                    <!-- Brand Logo -->
                    <div class="text-center mb-4">
                        <a href="index.html" class="logo-text fw-bold fs-1 text-decoration-none"
                            style="color: var(--text-color);">
                            Aveline
                        </a>
                        <p class="text-muted mt-2 mb-0 tracking-wider text-uppercase"
                            style="letter-spacing: 1px; font-size: 0.85rem;">Welcome to Aveline</p>
                    </div>

                    <!-- Auth Card -->
                    <div class="card auth-card p-4 p-md-5 shadow-sm border">

                        <!-- Nav Pills -->
                        <ul class="nav nav-pills auth-pills mb-4 w-100" id="auth-tab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link w-100 active" id="login-tab" data-bs-toggle="pill"
                                    data-bs-target="#login-content" type="button" role="tab"
                                    aria-controls="login-content" aria-selected="true">Login</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link w-100" id="register-tab" data-bs-toggle="pill"
                                    data-bs-target="#register-content" type="button" role="tab"
                                    aria-controls="register-content" aria-selected="false">Register</button>
                            </li>
                        </ul>

                        <!-- Tab Content -->
                        <div class="tab-content" id="auth-tabContent">

                            <!-- Login Tab -->
                            <div class="tab-pane fade show active" id="login-content" role="tabpanel"
                                aria-labelledby="login-tab">
                                <form id="loginForm" class="auth-form" novalidate>
                                    <div class="mb-4">
                                        <label for="loginEmail" class="form-label fw-medium">Email Address</label>
                                        <input type="email" class="form-control" id="loginEmail"
                                            placeholder="Enter your email" required>
                                        <div class="invalid-feedback">Please enter a valid email address.</div>
                                    </div>

                                    <div class="mb-4">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <label for="loginPassword"
                                                class="form-label fw-medium mb-0">Password</label>
                                            <a href="#" class="text-decoration-none text-primary small">Forgot
                                                Password?</a>
                                        </div>
                                        <input type="password" class="form-control mt-2" id="loginPassword"
                                            placeholder="Enter your password" required>
                                        <div class="invalid-feedback">Please enter your password.</div>
                                    </div>

                                    <div class="mb-4 form-check">
                                        <input type="checkbox" class="form-check-input" id="rememberMe">
                                        <label class="form-check-label text-muted" for="rememberMe">Remember me for 30
                                            days</label>
                                    </div>

                                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign In</button>
                                </form>

                                <div class="auth-divider">or continue with</div>

                                <div class="row g-3 mb-2">
                                    <div class="col-6">
                                        <button
                                            class="btn social-btn w-100 py-2 d-flex justify-content-center align-items-center gap-2">
                                            <i class="bi bi-google"></i> Google
                                        </button>
                                    </div>
                                    <div class="col-6">
                                        <button
                                            class="btn social-btn w-100 py-2 d-flex justify-content-center align-items-center gap-2">
                                            <i class="bi bi-facebook" style="color: #1877F2;"></i> Facebook
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Register Tab -->
                            <div class="tab-pane fade" id="register-content" role="tabpanel"
                                aria-labelledby="register-tab">
                                <form id="registerForm" class="auth-form" novalidate>
                                    <div class="mb-4">
                                        <label for="regName" class="form-label fw-medium">Full Name</label>
                                        <input type="text" class="form-control" id="regName"
                                            placeholder="Enter your full name" required>
                                        <div class="invalid-feedback">Please enter your name.</div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="regEmail" class="form-label fw-medium">Email Address</label>
                                        <input type="email" class="form-control" id="regEmail"
                                            placeholder="Enter your email" required>
                                        <div class="invalid-feedback">Please enter a valid email address.</div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="regPassword" class="form-label fw-medium">Password</label>
                                        <input type="password" class="form-control" id="regPassword"
                                            placeholder="Create a strong password" required>
                                        <div class="invalid-feedback">Please create a password.</div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="regConfirmPassword" class="form-label fw-medium">Confirm
                                            Password</label>
                                        <input type="password" class="form-control" id="regConfirmPassword"
                                            placeholder="Confirm your password" required>
                                        <div class="invalid-feedback">Please confirm your password.</div>
                                    </div>

                                    <div class="mb-4 form-check">
                                        <input type="checkbox" class="form-check-input" id="termsCheck" required>
                                        <label class="form-check-label text-muted" for="termsCheck">
                                            I agree to the <a href="#" class="text-primary text-decoration-none">Terms
                                                of Service</a> and <a href="#"
                                                class="text-primary text-decoration-none">Privacy Policy</a>
                                        </label>
                                        <div class="invalid-feedback">You must agree before submitting.</div>
                                    </div>

                                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Create
                                        Account</button>
                                </form>

                                <div class="auth-divider">or register with</div>

                                <div class="row g-3 mb-2">
                                    <div class="col-6">
                                        <button
                                            class="btn social-btn w-100 py-2 d-flex justify-content-center align-items-center gap-2">
                                            <i class="bi bi-google"></i> Google
                                        </button>
                                    </div>
                                    <div class="col-6">
                                        <button
                                            class="btn social-btn w-100 py-2 d-flex justify-content-center align-items-center gap-2">
                                            <i class="bi bi-facebook" style="color: #1877F2;"></i> Facebook
                                        </button>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>

</html>
